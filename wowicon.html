  .section-title { font-family: 'Cinzel', serif; font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--color-text-secondary); margin-bottom: 8px; padding-bottom: 4px; border-bottom: 0.5px solid var(--color-border-tertiary); }
  .grid { display: grid; gap: 6px; }
  .marks-grid { grid-template-columns: repeat(4, 1fr); }
  .abilities-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
  .mark-card { background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 8px 10px; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: border-color 0.15s; }
  .mark-card:hover { border-color: var(--color-border-primary); }
  .mark-icon { width: 36px; height: 36px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .mark-icon img { width: 36px; height: 36px; image-rendering: pixelated; }
  .mark-info { min-width: 0; }
  .mark-name { font-size: 12px; font-weight: 600; color: var(--color-text-primary); }
  .mark-code { font-size: 10px; font-family: var(--font-mono); color: var(--color-text-secondary); }
  .ability-card { background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 6px 10px; display: flex; align-items: center; gap: 8px; cursor: pointer; transition: border-color 0.15s; }
  .ability-card:hover { border-color: var(--color-border-primary); }
  .ability-icon { width: 28px; height: 28px; border-radius: 4px; flex-shrink: 0; object-fit: cover; }
  .ability-name { font-size: 11px; font-weight: 400; color: var(--color-text-primary); }
  .ability-id { font-size: 9px; font-family: var(--font-mono); color: var(--color-text-secondary); }
  .copied-toast { position: fixed; bottom: 16px; right: 16px; background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 8px 14px; font-size: 12px; color: var(--color-text-primary); opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 100; }
  .copied-toast.show { opacity: 1; }
  .section { margin-bottom: 20px; }
  .class-label { font-size: 10px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--color-text-secondary); margin-bottom: 6px; margin-top: 10px; border-bottom: 1px solid; padding-bottom: 3px; }

<div class="wow-ref">
  <div class="section">
    <div class="section-title">Raid Markers — click to copy image() formula</div>
    <div class="grid marks-grid" id="marks-grid"></div>
  </div>
  <div class="section">
    <div class="section-title">Abilities & Spell Icons — click to copy image() formula</div>
    <div id="abilities-container"></div>

</div>
<div class="copied-toast" id="toast">Copied!</div>

  { name: 'Star',     code: '{star}',     num: 1, file: 'icons/small/raid_target_1.jpg' },
  { name: 'Circle',   code: '{circle}',   num: 2, file: 'icons/small/raid_target_2.jpg' },
  { name: 'Diamond',  code: '{diamond}',  num: 3, file: 'icons/small/raid_target_3.jpg' },
  { name: 'Triangle', code: '{triangle}', num: 4, file: 'icons/small/raid_target_4.jpg' },
  { name: 'Moon',     code: '{moon}',     num: 5, file: 'icons/small/raid_target_5.jpg' },
  { name: 'Square',   code: '{square}',   num: 6, file: 'icons/small/raid_target_6.jpg' },
  { name: 'Cross',    code: '{cross}',    num: 7, file: 'icons/small/raid_target_7.jpg' },
  { name: 'Skull',    code: '{skull}',    num: 8, file: 'icons/small/raid_target_8.jpg' },
];

const marksGrid = document.getElementById('marks-grid');
MARKS.forEach(m => {
  const url = BASE + m.file;
  const imageFormula = `=image("${url}")`;
  const card = document.createElement('div');
  card.className = 'mark-card';
  card.innerHTML = `<div class="mark-icon"><img src="${url}" alt="${m.name}" onerror="this.style.opacity=0.3"/></div>
    <div class="mark-info">
      <div class="mark-name">${m.name}</div>
      <div class="mark-code">${m.code}</div>
    </div>`;
  card.addEventListener('click', () => copyText(imageFormula, m.name + ' image()'));
  marksGrid.appendChild(card);
});

function getIconUrl(id) {
  const icon = SPELL_ICONS[id] || 'inv_misc_questionmark';
  return `${BASE}icons/small/${icon}.jpg`;
}

const container = document.getElementById('abilities-container');
Object.entries(ABILITIES).forEach(([cls, spells]) => {
  const color = CLASS_COLORS[cls] || '#aaa';
  const label = document.createElement('div');
  label.className = 'class-label';
  label.style.color = color;
  label.style.borderColor = color + '50';
  label.textContent = cls;
  container.appendChild(label);

  const grid = document.createElement('div');
  grid.className = 'grid abilities-grid';
  grid.style.marginBottom = '4px';
  spells.forEach(sp => {
    const iconUrl = getIconUrl(sp.id);
    const formula = `=image("${iconUrl}")`;
    const card = document.createElement('div');
    card.className = 'ability-card';
    const img = document.createElement('img');
    img.className = 'ability-icon';
    img.src = iconUrl;
    img.alt = sp.name;
    img.onerror = () => { img.style.background = '#333'; img.style.opacity = '0.3'; };
    const info = document.createElement('div');
    info.innerHTML = `<div class="ability-name">${sp.name}</div><div class="ability-id">ID: ${sp.id}</div>`;
    card.appendChild(img);
    card.appendChild(info);
    card.addEventListener('click', () => copyText(formula, sp.name));
    grid.appendChild(card);
  });
  container.appendChild(grid);
});

const toast = document.getElementById('toast');
let toastTimer;
function copyText(text, label) {
  navigator.clipboard.writeText(text).then(() => {
    toast.textContent = `Copied: ${label}`;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
  });
}
