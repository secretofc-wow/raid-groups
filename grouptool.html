<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naxx Group Planner</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Exo+2:wght@300;400;600;700&display=swap');

:root {
  --bg:        #0a0c0f;
  --bg2:       #111418;
  --bg3:       #181c22;
  --border:    #2a2f3a;
  --border2:   #3a4050;
  --gold:      #c8a84b;
  --gold2:     #e8c870;
  --text:      #d0d4dc;
  --text2:     #888ea0;
  --green:     #00e87a;
  --red:       #ff4455;

  /* WoW class colors */
  --warrior:   #C69B6D;
  --paladin:   #F48CBA;
  --hunter:    #AAD372;
  --rogue:     #FFF468;
  --priest:    #FFFFFF;
  --shaman:    #0070DE;
  --mage:      #3FC7EB;
  --warlock:   #8788EE;
  --druid:     #FF7C0A;
  --tank:      #C69B6D;
  --tentative: #777777;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Exo 2', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Background texture */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 50% -20%, rgba(200,168,75,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 80% 80%, rgba(55,65,90,0.15) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

.app { position: relative; z-index: 1; }

/* ── Header ── */
header {
  padding: 18px 28px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 16px;
  background: rgba(10,12,15,0.95);
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(8px);
}

header h1 {
  font-family: 'Cinzel', serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 2px;
  text-shadow: 0 0 20px rgba(200,168,75,0.3);
}

header .sep { width: 1px; height: 24px; background: var(--border2); }

.boss-tabs {
  display: flex;
  gap: 4px;
  flex: 1;
}

.boss-tab {
  padding: 6px 14px;
  border-radius: 4px;
  border: 1px solid var(--border);
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  color: var(--text2);
  background: transparent;
  letter-spacing: .5px;
  transition: all .15s;
  font-family: 'Exo 2', sans-serif;
}
.boss-tab:hover { border-color: var(--border2); color: var(--text); }
.boss-tab.active {
  background: rgba(200,168,75,0.12);
  border-color: var(--gold);
  color: var(--gold);
}

.header-actions { display: flex; gap: 8px; align-items: center; }

/* ── Main layout ── */
.main {
  display: grid;
  grid-template-columns: 220px 1fr 280px;
  gap: 0;
  height: calc(100vh - 57px);
}

/* ── Left panel: player pool ── */
.pool-panel {
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.panel-header {
  padding: 12px 14px 10px;
  border-bottom: 1px solid var(--border);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  color: var(--gold);
  text-transform: uppercase;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.import-area {
  padding: 10px;
  border-bottom: 1px solid var(--border);
}

.import-area textarea {
  width: 100%;
  background: var(--bg3);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 7px 9px;
  font-size: 10px;
  font-family: monospace;
  resize: none;
  height: 60px;
  transition: border-color .15s;
}
.import-area textarea:focus { outline: none; border-color: var(--gold); }

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border-radius: 4px;
  border: none;
  cursor: pointer;
  font-size: 12px;
  font-weight: 700;
  font-family: 'Exo 2', sans-serif;
  letter-spacing: .3px;
  transition: all .15s;
}
.btn-gold {
  background: var(--gold);
  color: #0a0c0f;
  width: 100%;
  justify-content: center;
  margin-top: 6px;
}
.btn-gold:hover { background: var(--gold2); }
.btn-sm {
  padding: 4px 10px;
  font-size: 11px;
  background: var(--bg3);
  color: var(--text2);
  border: 1px solid var(--border);
}
.btn-sm:hover { border-color: var(--border2); color: var(--text); }
.btn-copy {
  background: var(--bg3);
  color: var(--green);
  border: 1px solid rgba(0,232,122,0.3);
  padding: 5px 12px;
  font-size: 11px;
}
.btn-copy:hover { background: rgba(0,232,122,0.08); }
.btn-copy.copied { background: rgba(0,232,122,0.15); }

.pool-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.pool-list::-webkit-scrollbar { width: 4px; }
.pool-list::-webkit-scrollbar-track { background: transparent; }
.pool-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* ── Player chip ── */
.player-chip {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 5px 8px;
  border-radius: 4px;
  border: 1px solid rgba(255,255,255,0.06);
  cursor: grab;
  user-select: none;
  transition: all .12s;
  background: rgba(255,255,255,0.03);
  font-size: 12px;
  font-weight: 600;
}
.player-chip:hover { border-color: rgba(255,255,255,0.15); background: rgba(255,255,255,0.06); transform: translateX(2px); }
.player-chip.dragging { opacity: 0.4; transform: scale(0.95); }
.player-chip.in-group { opacity: 0.35; }

.class-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.chip-name {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.chip-class {
  font-size: 9px;
  font-weight: 400;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: .3px;
}

/* ── Center: groups grid ── */
.groups-panel {
  overflow-y: auto;
  padding: 14px;
}

.groups-panel::-webkit-scrollbar { width: 4px; }
.groups-panel::-webkit-scrollbar-track { background: transparent; }
.groups-panel::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.groups-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

.group-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
  transition: border-color .15s;
}

.group-card.drag-over {
  border-color: var(--gold);
  background: rgba(200,168,75,0.05);
}

.group-title {
  background: var(--bg3);
  border-bottom: 1px solid var(--border);
  padding: 6px 10px;
  font-size: 11px;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: .8px;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.group-count {
  font-size: 10px;
  color: var(--text2);
  font-weight: 400;
}

.group-slots {
  padding: 4px;
  min-height: 130px;
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.slot-empty {
  height: 28px;
  border: 1px dashed var(--border);
  border-radius: 3px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  color: var(--border2);
  transition: all .15s;
}

.slot-empty.drag-over {
  border-color: var(--gold);
  background: rgba(200,168,75,0.08);
  color: var(--gold);
}

.slot-filled {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 7px;
  border-radius: 3px;
  border: 1px solid rgba(255,255,255,0.06);
  background: rgba(255,255,255,0.03);
  font-size: 12px;
  font-weight: 600;
  cursor: grab;
  user-select: none;
  position: relative;
  transition: all .12s;
}
.slot-filled:hover { background: rgba(255,255,255,0.07); }
.slot-filled:hover .remove-btn { opacity: 1; }
.slot-filled.dragging { opacity: 0.4; }

.remove-btn {
  margin-left: auto;
  opacity: 0;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: rgba(255,68,85,0.2);
  color: var(--red);
  border: none;
  cursor: pointer;
  font-size: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity .15s;
  flex-shrink: 0;
}
.remove-btn:hover { background: rgba(255,68,85,0.4); }

/* ── Right panel: WA output ── */
.output-panel {
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.wa-section {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
}

.wa-boss-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: .8px;
  text-transform: uppercase;
  margin-bottom: 5px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.wa-string {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 6px 8px;
  font-family: monospace;
  font-size: 10px;
  color: var(--green);
  word-break: break-all;
  line-height: 1.5;
  min-height: 32px;
  max-height: 60px;
  overflow-y: auto;
}

.wa-string.active-boss {
  border-color: rgba(0,232,122,0.3);
  background: rgba(0,232,122,0.04);
}

/* Stats bar */
.stats-bar {
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 10px;
}

.stat-pill {
  padding: 3px 8px;
  border-radius: 10px;
  font-size: 10px;
  font-weight: 700;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text2);
}
.stat-pill.ok { color: var(--green); border-color: rgba(0,232,122,0.3); }
.stat-pill.warn { color: var(--red); border-color: rgba(255,68,85,0.3); }

/* instructions overlay */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  gap: 12px;
  color: var(--text2);
  text-align: center;
  padding: 20px;
}

.empty-state .icon {
  font-size: 36px;
  opacity: 0.3;
}

.empty-state p {
  font-size: 12px;
  line-height: 1.6;
  max-width: 160px;
}

/* Clear group btn */
.clear-group {
  font-size: 9px;
  color: var(--text2);
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
  opacity: 0;
  transition: opacity .15s;
}
.group-card:hover .clear-group { opacity: 1; }
.clear-group:hover { color: var(--red); }

/* scrollbar output */
.output-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 0;
}
.output-scroll::-webkit-scrollbar { width: 4px; }
.output-scroll::-webkit-scrollbar-track { background: transparent; }
.output-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* status msg */
#status {
  font-size: 11px;
  padding: 4px 8px;
  border-radius: 3px;
  display: none;
}
#status.ok { color: var(--green); background: rgba(0,232,122,0.08); border: 1px solid rgba(0,232,122,0.2); display:block; }
#status.err { color: var(--red); background: rgba(255,68,85,0.08); border: 1px solid rgba(255,68,85,0.2); display:block; }

.output-header-row {
  padding: 8px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}

.copy-all-btn {
  background: rgba(200,168,75,0.1);
  color: var(--gold);
  border: 1px solid rgba(200,168,75,0.3);
  padding: 4px 10px;
  font-size: 10px;
  font-weight: 700;
  border-radius: 3px;
  cursor: pointer;
  font-family: 'Exo 2', sans-serif;
  transition: all .15s;
}
.copy-all-btn:hover { background: rgba(200,168,75,0.2); }

.wa-hint {
  font-size: 10px;
  color: var(--text2);
  padding: 6px 12px 8px;
  line-height: 1.5;
  border-bottom: 1px solid var(--border);
}
</style>
</head>
<body>
<div class="app">

<header>
  <h1>⚔ NAXX PLANNER</h1>
  <div class="sep"></div>
  <div class="boss-tabs" id="boss-tabs"></div>
  <div class="header-actions">
    <div id="status"></div>
  </div>
</header>

<div class="main">

  <!-- Left: player pool -->
  <div class="pool-panel">
    <div class="panel-header">
      <span>Players</span>
      <span id="pool-count" style="color:var(--text2);font-weight:400;font-size:10px">0</span>
    </div>
    <div class="import-area">
      <textarea id="json-input" placeholder="Paste comp tool JSON here..."></textarea>
      <button class="btn btn-gold" onclick="importJSON()">Import Roster</button>
    </div>
    <div class="pool-list" id="pool-list">
      <div class="empty-state">
        <div class="icon">⚔</div>
        <p>Paste your comp tool JSON and click Import</p>
      </div>
    </div>
  </div>

  <!-- Center: groups -->
  <div class="groups-panel" id="groups-panel">
    <div class="empty-state" style="height:100%">
      <div class="icon">🛡</div>
      <p>Import your roster to start building groups</p>
    </div>
  </div>

  <!-- Right: WA output -->
  <div class="output-panel">
    <div class="panel-header">
      <span>WeakAura Strings</span>
    </div>
    <div class="wa-hint">
      Copy each string → /wa → Group Setup → expand child aura → Author Options → Roster:
    </div>
    <div class="output-scroll" id="wa-output">
      <div class="empty-state" style="padding:30px">
        <p>Group strings will appear here</p>
      </div>
    </div>
  </div>

</div>
</div>

<script>
// ── Constants ─────────────────────────────────────────────────────────────────
const CLASS_COLORS = {
  Warrior:'#C69B6D', Paladin:'#F48CBA', Hunter:'#AAD372',
  Rogue:'#FFF468', Priest:'#CCCCCC', Shaman:'#0070DE',
  Mage:'#3FC7EB', Warlock:'#8788EE', Druid:'#FF7C0A',
  Tank:'#C69B6D', Tentative:'#666666', DeathKnight:'#C41F3B'
};

const BOSSES = [
  {id:'default', label:'Default'},
  {id:'gothik',  label:'Gothik'},
  {id:'4hm',     label:'4 Horsemen'},
  {id:'saph',    label:'Sapphiron'},
  {id:'kt',      label:"Kel'Thuzad"},
];

// ── State ─────────────────────────────────────────────────────────────────────
let players = [];   // [{name, cls, spec, conf}]
let currentBoss = 'default';
// groups[bossId][g1..8] = [name|null, name|null, ...]  (5 slots)
let groups = {};
BOSSES.forEach(b => {
  groups[b.id] = {};
  for(let g=1;g<=8;g++) groups[b.id][g] = [null,null,null,null,null];
});

let dragPlayer = null;   // {name, fromPool, fromGroup, fromGroupNum, fromSlot}

// ── Init ──────────────────────────────────────────────────────────────────────
function init(){
  buildBossTabs();
  renderWAOutput();
}

function buildBossTabs(){
  const tc = document.getElementById('boss-tabs');
  tc.innerHTML = '';
  BOSSES.forEach(b => {
    const d = document.createElement('button');
    d.className = 'boss-tab' + (b.id===currentBoss?' active':'');
    d.textContent = b.label;
    d.onclick = () => {
      currentBoss = b.id;
      document.querySelectorAll('.boss-tab').forEach(t=>t.classList.remove('active'));
      d.classList.add('active');
      renderGroups();
      renderWAOutput();
    };
    tc.appendChild(d);
  });
}

// ── Import ────────────────────────────────────────────────────────────────────
function importJSON(){
  const raw = document.getElementById('json-input').value.trim();
  let data;
  try { data = JSON.parse(raw); } catch(e){
    showStatus('Invalid JSON', 'err'); return;
  }
  const slots = data.slots || [];
  const seen = {};
  players = [];
  slots.forEach(s => {
    if(s.groupNumber <= 8 && s.isConfirmed !== 'cancelled' && !seen[s.name]){
      seen[s.name] = true;
      players.push({ name: s.name, cls: s.className, spec: s.specName, conf: s.isConfirmed });
    }
  });
  showStatus(`✓ ${players.length} players imported`, 'ok');
  renderPool();
  renderGroups();
  renderWAOutput();
}

function showStatus(msg, type){
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = type;
  clearTimeout(el._t);
  el._t = setTimeout(() => el.style.display='none', 3000);
}

// ── Pool ──────────────────────────────────────────────────────────────────────
function renderPool(){
  const list = document.getElementById('pool-list');
  list.innerHTML = '';
  document.getElementById('pool-count').textContent = players.length;

  if(!players.length){ list.innerHTML='<div class="empty-state"><p>No players imported</p></div>'; return; }

  // Sort by class
  const sorted = [...players].sort((a,b) => a.cls.localeCompare(b.cls) || a.name.localeCompare(b.name));

  sorted.forEach(p => {
    const inGroup = isInGroup(p.name);
    const chip = document.createElement('div');
    chip.className = 'player-chip' + (inGroup?' in-group':'');
    chip.draggable = true;
    chip.dataset.name = p.name;
    const color = CLASS_COLORS[p.cls] || '#888';
    chip.innerHTML = `
      <div class="class-dot" style="background:${color}"></div>
      <span class="chip-name" style="color:${color}">${p.name}</span>
      <span class="chip-class">${p.cls}</span>
    `;
    chip.addEventListener('dragstart', e => {
      dragPlayer = { name: p.name, fromPool: true };
      chip.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    chip.addEventListener('dragend', () => chip.classList.remove('dragging'));
    list.appendChild(chip);
  });
}

function isInGroup(name){
  const g = groups[currentBoss];
  for(let gi=1;gi<=8;gi++) if(g[gi].includes(name)) return true;
  return false;
}

function isInAnyBossGroup(name){
  return BOSSES.some(b => {
    const g = groups[b.id];
    for(let gi=1;gi<=8;gi++) if(g[gi].includes(name)) return true;
    return false;
  });
}

// ── Groups ────────────────────────────────────────────────────────────────────
function renderGroups(){
  const panel = document.getElementById('groups-panel');
  const g = groups[currentBoss];

  let html = '<div class="groups-grid">';
  for(let gi=1;gi<=8;gi++){
    const filled = g[gi].filter(n=>n).length;
    html += `<div class="group-card" id="gc-${gi}"
      ondragover="onGroupDragOver(event,${gi})"
      ondragleave="onGroupDragLeave(event,${gi})"
      ondrop="onGroupDrop(event,${gi})">
      <div class="group-title">
        <span>Group ${gi}</span>
        <span style="display:flex;gap:6px;align-items:center">
          <span class="group-count">${filled}/5</span>
          <button class="clear-group" onclick="clearGroup(${gi})" title="Clear group">✕</button>
        </span>
      </div>
      <div class="group-slots" id="gs-${gi}">`;

    for(let si=0;si<5;si++){
      const name = g[gi][si];
      if(name){
        const p = players.find(x=>x.name===name);
        const color = p ? (CLASS_COLORS[p.cls]||'#888') : '#888';
        const cls = p ? p.cls : '';
        html += `<div class="slot-filled" draggable="true"
          data-group="${gi}" data-slot="${si}"
          ondragstart="onSlotDragStart(event,${gi},${si})"
          ondragend="onSlotDragEnd(event)">
          <div class="class-dot" style="background:${color}"></div>
          <span style="color:${color};flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px">${name}</span>
          <span style="font-size:9px;color:#555;text-transform:uppercase;letter-spacing:.3px;margin-right:4px">${cls}</span>
          <button class="remove-btn" onclick="removeFromGroup(${gi},${si},event)">✕</button>
        </div>`;
      } else {
        html += `<div class="slot-empty" id="se-${gi}-${si}"
          ondragover="onSlotDragOver(event,${gi},${si})"
          ondragleave="onSlotDragLeave(event,${gi},${si})"
          ondrop="onSlotDrop(event,${gi},${si})">
          empty
        </div>`;
      }
    }
    html += '</div></div>';
  }
  html += '</div>';

  // Stats
  const total = Object.values(g).flat().filter(n=>n).length;
  const allNames = Object.values(g).flat().filter(n=>n);
  const dupes = allNames.length - new Set(allNames).size;
  html = `<div class="stats-bar">
    <div class="stat-pill ${total===players.length&&players.length>0?'ok':'warn'}">${total} / ${players.length} assigned</div>
    <div class="stat-pill ${dupes===0?'ok':'warn'}">${dupes} duplicate${dupes!==1?'s':''}</div>
  </div>` + html;

  panel.innerHTML = html;
}

// ── Drag & Drop ───────────────────────────────────────────────────────────────
function onSlotDragStart(e, gi, si){
  const name = groups[currentBoss][gi][si];
  dragPlayer = { name, fromPool: false, fromGroup: true, fromGroupNum: gi, fromSlot: si };
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}

function onSlotDragEnd(e){
  e.currentTarget && e.currentTarget.classList.remove('dragging');
}

function onSlotDragOver(e, gi, si){
  e.preventDefault();
  e.stopPropagation();
  document.getElementById(`se-${gi}-${si}`)?.classList.add('drag-over');
}

function onSlotDragLeave(e, gi, si){
  document.getElementById(`se-${gi}-${si}`)?.classList.remove('drag-over');
}

function onSlotDrop(e, gi, si){
  e.preventDefault();
  e.stopPropagation();
  document.getElementById(`se-${gi}-${si}`)?.classList.remove('drag-over');
  if(!dragPlayer) return;

  const g = groups[currentBoss];

  // If coming from another group slot, remove from source
  if(dragPlayer.fromGroup){
    g[dragPlayer.fromGroupNum][dragPlayer.fromSlot] = null;
  }

  g[gi][si] = dragPlayer.name;
  dragPlayer = null;
  renderGroups();
  renderPool();
  renderWAOutput();
}

function onGroupDragOver(e, gi){
  e.preventDefault();
  // Only highlight card if no empty slot targeted
  document.getElementById(`gc-${gi}`)?.classList.add('drag-over');
}

function onGroupDragLeave(e, gi){
  if(!e.currentTarget.contains(e.relatedTarget)){
    document.getElementById(`gc-${gi}`)?.classList.remove('drag-over');
  }
}

function onGroupDrop(e, gi){
  // Drop on the card itself (not a specific slot) → find first empty slot
  document.getElementById(`gc-${gi}`)?.classList.remove('drag-over');
  if(!dragPlayer) return;
  const g = groups[currentBoss];
  const firstEmpty = g[gi].indexOf(null);
  if(firstEmpty === -1){ showStatus('Group is full!', 'err'); dragPlayer=null; return; }

  if(dragPlayer.fromGroup) g[dragPlayer.fromGroupNum][dragPlayer.fromSlot] = null;
  g[gi][firstEmpty] = dragPlayer.name;
  dragPlayer = null;
  renderGroups();
  renderPool();
  renderWAOutput();
}

function removeFromGroup(gi, si, e){
  e.stopPropagation();
  groups[currentBoss][gi][si] = null;
  renderGroups();
  renderPool();
  renderWAOutput();
}

function clearGroup(gi){
  groups[currentBoss][gi] = [null,null,null,null,null];
  renderGroups();
  renderPool();
  renderWAOutput();
}

// ── WeakAura Output ───────────────────────────────────────────────────────────
function buildWAString(bossId){
  const g = groups[bossId];
  const names = [];
  for(let gi=1;gi<=8;gi++){
    g[gi].forEach(n => { if(n) names.push(n.split('/')[0]); });
  }
  return names.join(' ');
}

function renderWAOutput(){
  const container = document.getElementById('wa-output');
  let html = '';

  BOSSES.forEach(b => {
    const s = buildWAString(b.id);
    const filled = Object.values(groups[b.id]).flat().filter(n=>n).length;
    const isActive = b.id === currentBoss;
    html += `<div class="wa-section">
      <div class="wa-boss-label">
        <span>${b.label} <span style="color:var(--text2);font-weight:400">(${filled}/40)</span></span>
        <button class="btn btn-copy" onclick="copyWA('${b.id}',this)">Copy</button>
      </div>
      <div class="wa-string ${isActive?'active-boss':''}">${s || '<span style="color:#444">— empty —</span>'}</div>
    </div>`;
  });

  container.innerHTML = html;
}

function copyWA(bossId, btn){
  const s = buildWAString(bossId);
  if(!s){ showStatus('Nothing to copy', 'err'); return; }
  navigator.clipboard.writeText(s).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
  });
}

// ── Start ─────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
